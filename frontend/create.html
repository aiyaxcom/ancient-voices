<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建场景 - 对话古人</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234a5568' rx='16' width='100' height='100'/><text y='.9em' x='50%' text-anchor='middle' font-size='70' font-weight='bold' fill='white'>📚</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-inner {
            max-width: 1200px;
            width: calc(100% - 40px);
            padding: 16px 0;
            display: flex;
            align-items: center;
        }

        .header-inner a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main {
            padding: 80px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .title {
            font-size: 28px;
            margin-bottom: 24px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 32px;
        }

        /* Steps */
        .steps {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .step {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            opacity: 0.5;
        }

        .step.active {
            opacity: 1;
            background: rgba(237, 137, 54, 0.3);
            border: 1px solid #ed8936;
        }

        .step-number {
            font-size: 24px;
            font-weight: 600;
            color: #ed8936;
        }

        /* Form Sections */
        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ed8936;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }

        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn.primary {
            background: #ed8936;
        }

        .btn.primary:hover {
            background: #dd6b20;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Result Preview */
        .preview-section {
            display: none;
        }

        .preview-section.show {
            display: block;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .preview-card h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }

        .preview-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.5;
        }

        .preview-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        .preview-item label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .preview-item value {
            color: white;
        }

        /* Agent Preview Grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .agent-preview {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
        }

        .agent-preview h4 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #ed8936;
        }

        .agent-preview p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ed8936;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 16px;
            font-size: 16px;
        }

        /* Success */
        .success-section {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .success-section.show {
            display: block;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .success-title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .success-text {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 24px;
        }

        /* Message Modal */
        .msg-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .msg-modal-overlay.show {
            display: flex;
        }

        .msg-modal {
            background: #2d3748;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            padding: 24px;
        }

        .msg-modal-title {
            font-size: 18px;
            margin-bottom: 12px;
        }

        .msg-modal-body {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .msg-modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .header-inner {
                padding: 12px 0;
            }

            .title {
                font-size: 22px;
            }

            .steps {
                flex-direction: column;
                gap: 8px;
            }

            .step {
                padding: 8px 12px;
            }

            textarea {
                font-size: 14px;
            }

            .preview-card {
                padding: 12px;
            }

            .agent-edit-grid {
                grid-template-columns: 1fr;
            }

            .msg-modal {
                width: 95%;
                padding: 16px;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/">
                <span>📚</span>
                <span>返回首页</span>
            </a>
        </div>
    </header>

    <main class="main">
        <h1 class="title">创建对话场景</h1>
        <p class="subtitle">上传文言文原文，AI 自动分析提取人物角色，生成可对话的智能体</p>

        <!-- Steps -->
        <div class="steps">
            <div class="step active" id="step1">
                <div class="step-number">1</div>
                <div>输入原文</div>
            </div>
            <div class="step" id="step2">
                <div class="step-number">2</div>
                <div>AI 分析</div>
            </div>
            <div class="step" id="step3">
                <div class="step-number">3</div>
                <div>确认保存</div>
            </div>
        </div>

        <!-- Step 1: Input Text -->
        <div class="section active" id="inputSection">
            <h2 class="section-title">输入文言文原文</h2>
            <div class="form-group">
                <label>出处（可选）</label>
                <input type="text" id="sourceWork" placeholder="如：《史记·项羽本纪》">
            </div>
            <div class="form-group">
                <label>原文内容（至少 50 字）</label>
                <textarea id="originalText" placeholder="请粘贴文言文原文..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="goBack()">取消</button>
                <button class="btn primary" onclick="analyzeText()" id="analyzeBtn">开始分析</button>
            </div>
        </div>

        <!-- Step 2: Preview Results -->
        <div class="section" id="previewSection">
            <h2 class="section-title">AI 分析结果</h2>

            <div class="preview-section" id="scenarioPreview">
                <h3 style="margin-bottom: 16px;">场景信息</h3>
                <div class="preview-card">
                    <div class="preview-item">
                        <label>标题</label>
                        <value id="previewTitle"></value>
                    </div>
                    <div class="preview-item">
                        <label>出处</label>
                        <value id="previewSource"></value>
                    </div>
                    <p id="previewDesc"></p>
                </div>
            </div>

            <div class="preview-section" id="agentsPreview">
                <h3 style="margin-bottom: 16px;">提取的角色</h3>
                <div class="agent-grid" id="agentsGrid"></div>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="resetForm()">重新输入</button>
                <button class="btn primary" onclick="saveScenario()" id="saveBtn">确认保存</button>
            </div>
        </div>

        <!-- Step 3: Success -->
        <div class="section" id="successSection">
            <div class="success-section show">
                <div class="success-icon">✅</div>
                <h2 class="success-title">创建成功！</h2>
                <p class="success-text">场景已创建，可以开始与历史人物对话了</p>
                <div class="btn-group" style="justify-content: center;">
                    <button class="btn" onclick="goHome()">返回首页</button>
                    <button class="btn primary" onclick="goToScenario()">进入场景</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <a href="/">对话古人</a>
    </footer>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">正在分析原文...</div>
        </div>
    </div>

    <!-- Message Modal -->
    <div class="msg-modal-overlay" id="msgModal">
        <div class="msg-modal">
            <h3 class="msg-modal-title" id="msgModalTitle">提示</h3>
            <div class="msg-modal-body" id="msgModalBody"></div>
            <div class="msg-modal-buttons" id="msgModalButtons"></div>
        </div>
    </div>

    <script src="/api/client.js"></script>
    <script>
        let analysisResult = null;
        let savedScenarioId = null;

        // ========== 模态框工具函数 ==========

        // 显示消息模态框
        function showModal(options) {
            const modal = document.getElementById('msgModal');
            const titleEl = document.getElementById('msgModalTitle');
            const bodyEl = document.getElementById('msgModalBody');
            const buttonsEl = document.getElementById('msgModalButtons');

            titleEl.textContent = options.title || '提示';
            bodyEl.innerHTML = options.message || '';

            buttonsEl.innerHTML = '';
            const buttons = options.buttons || [{ text: '确定', onclick: closeModal }];
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = btn.className || 'btn';
                button.textContent = btn.text;
                button.onclick = btn.onclick;
                buttonsEl.appendChild(button);
            });

            modal.classList.add('show');
        }

        // 关闭消息模态框
        function closeModal() {
            document.getElementById('msgModal').classList.remove('show');
        }

        // 显示简单提示
        function showAlert(title, message) {
            showModal({
                title: title,
                message: message,
                buttons: [{ text: '确定', onclick: closeModal }]
            });
        }

        // 点击模态框外部关闭
        document.getElementById('msgModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ========== 业务逻辑 ==========

        // 检查登录
        async function checkAuth() {
            try {
                await wenyanAPI.checkAuth();
            } catch (e) {
                redirectToLogin();
            }
        }

        // 分析原文
        async function analyzeText() {
            const text = document.getElementById('originalText').value.trim();
            const sourceWork = document.getElementById('sourceWork').value.trim();

            if (text.length < 50) {
                showAlert('提示', '原文内容至少需要 50 字');
                return;
            }

            showLoading('正在分析原文...');
            document.getElementById('analyzeBtn').disabled = true;

            try {
                analysisResult = await wenyanAPI.analyzeText(text, sourceWork);
                renderPreview();
                goToStep(2);
            } catch (e) {
                showAlert('分析失败', e.message);
            } finally {
                hideLoading();
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        // 渲染预览
        function renderPreview() {
            const scenario = analysisResult.scenario;
            const agents = analysisResult.agents;

            // 场景信息
            document.getElementById('previewTitle').textContent = scenario.title;
            document.getElementById('previewSource').textContent = scenario.source_work || '未提供';
            document.getElementById('previewDesc').textContent = scenario.description || '暂无描述';

            // 角色列表
            const agentsGrid = document.getElementById('agentsGrid');
            agentsGrid.innerHTML = agents.map((agent, idx) => `
                <div class="agent-preview">
                    <h4>${idx + 1}. ${agent.name}</h4>
                    <p><strong>性格：</strong>${agent.personality}</p>
                    <p><strong>目标：</strong>${agent.goal}</p>
                    ${agent.speech_style ? `<p><strong>风格：</strong>${agent.speech_style}</p>` : ''}
                </div>
            `).join('');

            document.getElementById('scenarioPreview').classList.add('show');
            document.getElementById('agentsPreview').classList.add('show');
        }

        // 保存场景
        async function saveScenario() {
            showLoading('正在保存场景...');
            document.getElementById('saveBtn').disabled = true;

            try {
                // 更新 scenario_id（分析时为 0）
                const agents = analysisResult.agents.map(a => ({
                    ...a,
                    scenario_id: 0
                }));

                const result = await wenyanAPI.saveScenario(analysisResult.scenario, agents);
                savedScenarioId = result.scenario_id;
                goToStep(3);
            } catch (e) {
                showAlert('保存失败', e.message);
            } finally {
                hideLoading();
                document.getElementById('saveBtn').disabled = false;
            }
        }

        // 步骤切换
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            if (step === 1) {
                document.getElementById('inputSection').classList.add('active');
            } else if (step === 2) {
                document.getElementById('previewSection').classList.add('active');
            } else if (step === 3) {
                document.getElementById('successSection').classList.add('active');
            }
        }

        // 重置表单
        function resetForm() {
            document.getElementById('originalText').value = '';
            document.getElementById('sourceWork').value = '';
            analysisResult = null;
            goToStep(1);
        }

        // 显示/隐藏加载
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // 导航
        function goBack() {
            window.location.href = '/';
        }

        function goHome() {
            window.location.href = '/';
        }

        function goToScenario() {
            window.location.href = `/scenario.html?id=${savedScenarioId}`;
        }

        // 初始化
        checkAuth();
    </script>
</body>
</html>
