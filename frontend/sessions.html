<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的对话 - 对话古人</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234a5568' rx='16' width='100' height='100'/><text y='.9em' x='50%' text-anchor='middle' font-size='70' font-weight='bold' fill='white'>📚</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-inner {
            max-width: 800px;
            width: calc(100% - 40px);
            padding: 16px 0;
            display: flex;
            align-items: center;
        }

        .header a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn.primary {
            background: #ed8936;
        }

        .btn.primary:hover {
            background: #dd6b20;
        }

        .btn.danger {
            background: #e53e3e;
        }

        .btn.danger:hover {
            background: #c53030;
        }

        .btn.small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .main {
            padding: 80px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 24px;
            margin-bottom: 24px;
        }

        .session-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .session-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .session-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .session-meta {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .session-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .session-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .report-badge {
            background: rgba(237, 137, 54, 0.3);
            color: #ed8936;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state h3 {
            margin-bottom: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Report Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #2d3748;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h2 {
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .report-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .report-section {
            margin-bottom: 16px;
        }

        .report-section h4 {
            color: #ed8936;
            margin-bottom: 8px;
        }

        .report-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .report-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .report-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .report-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .report-item-title {
            font-size: 14px;
        }

        .report-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .report-status.completed {
            background: rgba(72, 187, 120, 0.3);
            color: #48bb78;
        }

        .report-status.pending, .report-status.processing {
            background: rgba(237, 137, 54, 0.3);
            color: #ed8936;
        }

        .report-status.failed {
            background: rgba(229, 62, 62, 0.3);
            color: #e53e3e;
        }

        /* Message Modal */
        .msg-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .msg-modal-overlay.show {
            display: flex;
        }

        .msg-modal {
            background: #2d3748;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            padding: 24px;
        }

        .msg-modal-title {
            font-size: 18px;
            margin-bottom: 12px;
        }

        .msg-modal-body {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .msg-modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .header-inner {
                flex-wrap: wrap;
                gap: 8px;
            }

            .header-right .btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .session-header {
                flex-direction: column;
                gap: 12px;
            }

            .session-actions {
                flex-wrap: wrap;
                width: 100%;
            }

            .session-actions .btn {
                flex: 1;
            }

            .session-footer {
                flex-direction: column;
                gap: 8px;
            }

            .modal, .msg-modal {
                width: 95%;
                padding: 16px;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/">
                <span>📚</span>
                <span>返回首页</span>
            </a>
        </div>
    </header>

    <main class="main">
        <h1 class="page-title">我的对话</h1>
        <div id="sessionList">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <a href="/">对话古人</a>
    </footer>

    <!-- Report Modal -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="reportModalTitle">反思报告</h2>
                <button class="modal-close" onclick="closeReportModal()">×</button>
            </div>
            <div class="modal-body" id="reportModalBody">
                <!-- 报告内容 -->
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div class="msg-modal-overlay" id="msgModal">
        <div class="msg-modal">
            <h3 class="msg-modal-title" id="msgModalTitle">提示</h3>
            <div class="msg-modal-body" id="msgModalBody"></div>
            <div class="msg-modal-buttons" id="msgModalButtons"></div>
        </div>
    </div>

    <script src="/api/client.js"></script>
    <script>
        let sessions = [];

        // ========== 模态框工具函数 ==========

        // 显示消息模态框
        function showModal(options) {
            const modal = document.getElementById('msgModal');
            const titleEl = document.getElementById('msgModalTitle');
            const bodyEl = document.getElementById('msgModalBody');
            const buttonsEl = document.getElementById('msgModalButtons');

            titleEl.textContent = options.title || '提示';
            bodyEl.innerHTML = options.message || '';

            buttonsEl.innerHTML = '';
            const buttons = options.buttons || [{ text: '确定', onclick: closeModal }];
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = btn.className || 'btn';
                button.textContent = btn.text;
                button.onclick = btn.onclick;
                buttonsEl.appendChild(button);
            });

            modal.classList.add('show');
        }

        // 关闭消息模态框
        function closeModal() {
            document.getElementById('msgModal').classList.remove('show');
        }

        // 显示确认对话框（返回 Promise）
        function showConfirm(title, message) {
            return new Promise(resolve => {
                showModal({
                    title: title,
                    message: message,
                    buttons: [
                        { text: '取消', onclick: () => { closeModal(); resolve(false); } },
                        { text: '确定', className: 'btn primary', onclick: () => { closeModal(); resolve(true); } }
                    ]
                });
            });
        }

        // 显示简单提示
        function showAlert(title, message) {
            showModal({
                title: title,
                message: message,
                buttons: [{ text: '确定', onclick: closeModal }]
            });
        }

        // 点击模态框外部关闭
        document.getElementById('msgModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ========== 业务逻辑 ==========

        // 初始化
        async function init() {
            try {
                // 检查登录
                const user = await wenyanAPI.checkAuth();
                // 加载会话列表
                await loadSessions();
            } catch (e) {
                // 未登录，跳转到首页
                window.location.href = '/';
            }
        }

        // 加载会话列表
        async function loadSessions() {
            try {
                const data = await wenyanAPI.listSessions(50, 0);
                sessions = data.sessions || [];
                renderSessions();
            } catch (e) {
                document.getElementById('sessionList').innerHTML = `
                    <div class="empty-state">
                        <h3>加载失败</h3>
                        <p>${e.message}</p>
                    </div>
                `;
            }
        }

        // 渲染会话列表
        function renderSessions() {
            const container = document.getElementById('sessionList');

            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>暂无对话记录</h3>
                        <p>选择一个场景开始你的历史对话之旅</p>
                        <a href="/" class="btn primary" style="margin-top: 16px;">浏览场景</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="session-list">' +
                sessions.map(session => `
                    <div class="session-card">
                        <div class="session-header">
                            <div class="session-info">
                                <h3>${session.scenario_title || '未知场景'}</h3>
                                <div class="session-meta">
                                    角色：${session.target_agent?.name || '未选择'} |
                                    模式：${getModeText(session.mode)}
                                </div>
                            </div>
                            <div class="session-actions">
                                <button class="btn primary small" onclick="continueSession(${session.id})">继续对话</button>
                                <button class="btn small" onclick="showReports(${session.id})">查看报告</button>
                                <button class="btn danger small" onclick="deleteSession(${session.id})">删除</button>
                            </div>
                        </div>
                        <div class="session-footer">
                            <span>创建时间：${formatTime(session.created_at)}</span>
                            <span class="report-badge" id="reportCount-${session.id}">报告：0</span>
                        </div>
                    </div>
                `).join('') +
                '</div>';

            // 加载每个会话的报告数量
            sessions.forEach(session => loadReportCount(session.id));
        }

        // 获取模式文本
        function getModeText(mode) {
            const modes = {
                'interview': '访谈模式',
                'conflict': '冲突模拟',
                'strategist': '军师模式'
            };
            return modes[mode] || mode;
        }

        // 格式化时间
        function formatTime(timeStr) {
            if (!timeStr) return '未知';
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN');
        }

        // 加载报告数量
        async function loadReportCount(sessionId) {
            try {
                const data = await wenyanAPI.listSessionReports(sessionId);
                const count = data.reports ? data.reports.length : 0;
                const badge = document.getElementById(`reportCount-${sessionId}`);
                if (badge) {
                    badge.textContent = `报告：${count}`;
                }
            } catch (e) {
                // 忽略错误
            }
        }

        // 继续对话
        function continueSession(sessionId) {
            window.location.href = `/chat.html?session_id=${sessionId}&from=sessions`;
        }

        // 显示报告列表
        async function showReports(sessionId) {
            try {
                const data = await wenyanAPI.listSessionReports(sessionId);
                const reports = data.reports || [];

                if (reports.length === 0) {
                    showModalContent('暂无报告', '<p>该会话尚未生成反思报告</p>');
                    return;
                }

                // 如果只有一个已完成的报告，直接显示内容
                const completedReports = reports.filter(r => r.status === 'completed');
                if (completedReports.length === 1 && reports.length === 1) {
                    await viewReport(completedReports[0].id);
                    return;
                }

                const content = '<div class="report-list">' +
                    reports.map(report => `
                        <div class="report-item" onclick="viewReport(${report.id})">
                            <div class="report-item-header">
                                <span class="report-item-title">${formatTime(report.created_at)}</span>
                                <span class="report-status ${report.status}">${getStatusText(report.status)}</span>
                            </div>
                            ${report.status === 'completed' ? '<button class="btn small" style="margin-top: 8px;">查看详情</button>' : ''}
                        </div>
                    `).join('') +
                    '</div>';

                showModalContent('反思报告', content);
            } catch (e) {
                showModalContent('加载失败', `<p>${e.message}</p>`);
            }
        }

        // 查看报告详情
        async function viewReport(reportId) {
            try {
                const report = await wenyanAPI.getReport(reportId);

                if (report.status === 'pending' || report.status === 'processing') {
                    showModalContent('报告生成中', '<p>报告正在生成，请稍后再查看</p>');
                    return;
                }

                if (report.status === 'failed') {
                    showModalContent('生成失败', `<p>${report.error_message || '报告生成失败'}</p>`);
                    return;
                }

                let content = '';
                if (report.report_content) {
                    content += `<div class="report-section"><h4>反思报告</h4><p>${report.report_content}</p></div>`;
                }
                if (report.core_dilemma) {
                    content += `<div class="report-section"><h4>核心困境</h4><p>${report.core_dilemma}</p></div>`;
                }
                if (report.decision_logic) {
                    content += `<div class="report-section"><h4>决策逻辑</h4><p>${report.decision_logic}</p></div>`;
                }
                if (report.emotional_analysis) {
                    content += `<div class="report-section"><h4>情感分析</h4><p>${report.emotional_analysis}</p></div>`;
                }
                if (report.historical_context) {
                    content += `<div class="report-section"><h4>历史背景</h4><p>${report.historical_context}</p></div>`;
                }
                if (report.reflection_questions && report.reflection_questions.length > 0) {
                    content += `<div class="report-section"><h4>反思问题</h4><ul>${report.reflection_questions.map(q => `<li>${q}</li>`).join('')}</ul></div>`;
                }

                showModalContent('反思报告', content || '<p>暂无内容</p>');
            } catch (e) {
                showModalContent('加载失败', `<p>${e.message}</p>`);
            }
        }

        // 获取状态文本
        function getStatusText(status) {
            const statuses = {
                'pending': '等待中',
                'processing': '生成中',
                'completed': '已完成',
                'failed': '失败'
            };
            return statuses[status] || status;
        }

        // 显示模态框内容
        function showModalContent(title, content) {
            document.getElementById('reportModalTitle').textContent = title;
            document.getElementById('reportModalBody').innerHTML = `<div class="report-content">${content}</div>`;
            document.getElementById('reportModal').classList.add('show');
        }

        // 关闭模态框
        function closeReportModal() {
            document.getElementById('reportModal').classList.remove('show');
        }

        // 删除会话
        async function deleteSession(sessionId) {
            const confirmed = await showConfirm('删除确认', '确定删除该会话？删除后无法恢复。');
            if (!confirmed) return;

            try {
                await wenyanAPI.deleteSession(sessionId);
                // 从列表中移除
                sessions = sessions.filter(s => s.id !== sessionId);
                renderSessions();
            } catch (e) {
                showAlert('删除失败', e.message);
            }
        }

        // 点击模态框外部关闭
        document.getElementById('reportModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeReportModal();
            }
        });

        // 启动
        init();
    </script>
</body>
</html>
